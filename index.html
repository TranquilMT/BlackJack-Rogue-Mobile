<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack Rogue</title>
    <style>
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background-color: #020202;
        color: #d1d5db;
        overflow: hidden;
      }
      #root {
        height: 100vh;
        width: 100vw;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
      }
      .font-serif-display {
        font-family: 'Cinzel', serif;
        font-weight: 700;
        text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
      }
      
      .font-mono {
        font-family: 'VT323', monospace;
      }

      .font-rogue-number {
        font-family: 'Press Start 2P', cursive;
      }

      .pixel-text-shadow {
        text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
      }

      .pixel-text-shadow-white {
        text-shadow: 2px 2px 0px rgba(255,255,255,0.2);
      }
      
      /* Dark Medieval Vignette */
      .vignette::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%);
        z-index: 9998;
        pointer-events: none;
      }

      /* CRT Scanline Effect */
      .crt-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 9999;
        background-size: 100% 4px, 3px 100%;
        pointer-events: none;
        opacity: 0.15;
      }

      .crt-overlay::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 0%, rgba(18, 16, 16, 0.2) 50%, rgba(18, 16, 16, 0) 100%);
        background-size: 100% 200%;
        animation: scanline 10s linear infinite;
        pointer-events: none;
      }

      @keyframes scanline {
        0% { background-position: 0 -100%; }
        100% { background-position: 0 100%; }
      }

      .evil-glow {
        filter: drop-shadow(0 0 10px rgba(220, 38, 38, 0.5));
      }

      .evil-glow-intense {
        filter: drop-shadow(0 0 20px rgba(220, 38, 38, 0.8));
      }

      .ken-burns-bg {
        position: absolute;
        inset: 0;
        background-image: url('https://images.unsplash.com/photo-1519074063912-ad25b57b9d17?auto=format&fit=crop&q=80&w=2070');
        background-size: cover;
        background-position: center;
        animation: ken-burns 60s linear infinite;
        opacity: 0.15;
        z-index: 0;
        filter: sepia(0.5) contrast(1.2) brightness(0.5);
      }
      @keyframes ken-burns {
        0% { transform: scale(1); }
        50% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }

      /* Scrollbar styling - Aged look */
      .custom-scrollbar {
          -webkit-overflow-scrolling: touch;
          overscroll-behavior: contain;
          touch-action: pan-y;
      }
      .custom-scrollbar::-webkit-scrollbar {
          width: 8px;
      }
      
      .custom-scrollbar::-webkit-scrollbar-track {
          background: #0a0a0a; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: #450a0a; 
          border: 1px solid #7f1d1d;
          border-radius: 0px;
      }
      
      /* Card Sheen - Spectral Gold */
      .card-sheen::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -75%;
        width: 50%;
        height: 200%;
        background: linear-gradient(to right, rgba(180,83,9,0) 0%, rgba(251,191,36,0.15) 50%, rgba(180,83,9,0) 100%);
        transform: rotate(25deg);
        animation: sheen 6s infinite;
        pointer-events: none;
        z-index: 1;
      }

      @keyframes sheen {
        0%, 70% { left: -75%; }
        100% { left: 125%; }
      }

      /* Candle Flicker Effect */
      .candle-flicker {
        animation: flicker 4s infinite;
      }

      /* Blood Drip Animations */
      @keyframes blood-drip-1 {
        0% { height: 0; opacity: 0.8; }
        25% { height: 20px; opacity: 0.8; }
        50% { height: 20px; opacity: 0.8; }
        75% { height: 0; opacity: 0; }
        100% { height: 0; opacity: 0; }
      }
      .animate-blood-drip-1 {
        animation: blood-drip-1 2s infinite;
        animation-delay: 1s;
      }

      @keyframes blood-drip-2 {
        0% { height: 0; opacity: 0.9; }
        25% { height: 35px; opacity: 0.9; }
        50% { height: 35px; opacity: 0.9; }
        75% { height: 0; opacity: 0; }
        100% { height: 0; opacity: 0; }
      }
      .animate-blood-drip-2 {
        animation: blood-drip-2 3s infinite;
        animation-delay: 0.5s;
      }

      /* Glitch Animation */
      @keyframes glitch {
        0% { clip-path: inset(0 0 0 0); transform: translateX(-2px); }
        20% { clip-path: inset(10% 0 80% 0); transform: translateX(2px); }
        40% { clip-path: inset(0 0 0 0); transform: translateX(-1px); }
        60% { clip-path: inset(80% 0 10% 0); transform: translateX(1px); }
        80% { clip-path: inset(0 0 0 0); transform: translateX(0); }
        100% { clip-path: inset(0 0 0 0); transform: translateX(0); }
      }
      .animate-glitch {
        animation: glitch 0.2s infinite;
        animation-delay: 3s;
      }

      /* Custom Pulse Animations */
      @keyframes pulse-slow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      .animate-pulse-slow {
        animation: pulse-slow 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse-fast {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      .animate-pulse-fast {
        animation: pulse-fast 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes sheen {
        0% { transform: translateX(-100%); }
        40% { transform: translateX(200%); }
        100% { transform: translateX(200%); }
      }
      .animate-sheen {
        animation: sheen 5s linear infinite;
      }

      @keyframes flame {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        50% { opacity: 1; transform: translateY(-15px) scale(1.5); }
        100% { transform: translateY(-30px) scale(0.2); opacity: 0; }
      }
      .animate-flame {
        animation: flame 0.8s ease-out infinite;
      }

      @keyframes wiggle {
        0%, 100% { transform: scale(1) rotate(0deg); }
        25% { transform: scale(1.2) rotate(-10deg); }
        75% { transform: scale(1.2) rotate(10deg); }
      }
      .animate-wiggle {
        animation: wiggle 2s ease-in-out infinite;
      }

      @keyframes boss-enraged {
        0%, 100% { border-color: rgba(249, 115, 22, 0.4); box-shadow: 0 0 10px rgba(249, 115, 22, 0.3); }
        50% { border-color: rgba(249, 115, 22, 0.8); box-shadow: 0 0 30px rgba(249, 115, 22, 0.6); }
      }
      .animate-boss-enraged {
        animation: boss-enraged 1s ease-in-out infinite;
      }

      @keyframes boss-desperate {
        0%, 100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 10px rgba(239, 68, 68, 0.2); }
        50% { border-color: rgba(239, 68, 68, 0.6); box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
      }
      .animate-boss-desperate {
        animation: boss-desperate 3s ease-in-out infinite;
      }

      @keyframes boss-elite {
        0%, 100% { border-color: rgba(168, 85, 247, 0.3); box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }
        50% { border-color: rgba(168, 85, 247, 0.6); box-shadow: 0 0 25px rgba(168, 85, 247, 0.5); }
      }
      .animate-boss-elite {
        animation: boss-elite 3s ease-in-out infinite;
      }
    </style>
  </head>
  <body class="bg-black text-stone-200 vignette">
    <div class="crt-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
